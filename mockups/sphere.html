<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ambient</title>
<style>
  :root {
    /* Off-white. Matches the chat surface's --agent-hue default
       (src/server/minimal-chat-page.ts). Monochromatic — single hue
       carries text, shadow, and atmosphere. */
    --agent-hue: 244, 243, 240;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #06070a;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }

  /* The <pre> fills the entire viewport. The cloud is generated to fit
     the grid that this viewport implies, edge to edge in every direction.
     No mask, no compositional vignette — the animation IS the page. */
  #ambient {
    position: fixed;
    inset: 0;
    margin: 0;
    padding: 0;
    font: 12px/0.92
      'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: rgba(var(--agent-hue), 0.92);
    text-shadow: 0 0 6px rgba(var(--agent-hue), 0.18);
    white-space: pre;
    user-select: none;
    letter-spacing: 0;
    overflow: hidden;
  }
</style>
</head>
<body>
  <pre id="ambient" aria-hidden="true"></pre>

<script>
'use strict';

// =============================================================
//  Atmospheric ASCII — volumetric fog filling the viewport.
//  The grid auto-sizes to the page; no frame, no boundary.
// =============================================================

const TARGET_FPS   = 22;
const FRAME_INT_MS = 1000 / TARGET_FPS;

// Letter ramp, sparsest → densest. 50 levels resolves continuous tone
// without per-cell alpha — the eye reads ink coverage as luminosity.
const RAMP = " .'`,-:_;~+=*\\/?>oescrtljiCJLTYZUVDAOSXP62583709HEKRNBMW%@";
const N_LEVELS = RAMP.length;

// Bayer 8×8 ordered dither — stable across frames so the texture doesn't
// flicker. Each cell pulls a threshold offset based on (col, row) mod 8.
const BAYER = (() => {
  const raw = [
     0, 32,  8, 40,  2, 34, 10, 42,
    48, 16, 56, 24, 50, 18, 58, 26,
    12, 44,  4, 36, 14, 46,  6, 38,
    60, 28, 52, 20, 62, 30, 54, 22,
     3, 35, 11, 43,  1, 33,  9, 41,
    51, 19, 59, 27, 49, 17, 57, 25,
    15, 47,  7, 39, 13, 45,  5, 37,
    63, 31, 55, 23, 61, 29, 53, 21,
  ];
  const m = new Float32Array(64);
  for (let i = 0; i < 64; i++) m[i] = (raw[i] + 0.5) / 64 - 0.5;
  return m;
})();

// ---------- 3D Perlin noise -------------------------------------------------
const PERM = new Uint8Array(512);
(() => {
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    const tmp = p[i]; p[i] = p[j]; p[j] = tmp;
  }
  for (let i = 0; i < 512; i++) PERM[i] = p[i & 255];
})();

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }

function grad3(hash, x, y, z) {
  const h = hash & 15;
  const u = h < 8 ? x : y;
  const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
  return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
}

function noise3(x, y, z) {
  const X = Math.floor(x) & 255;
  const Y = Math.floor(y) & 255;
  const Z = Math.floor(z) & 255;
  x -= Math.floor(x);
  y -= Math.floor(y);
  z -= Math.floor(z);
  const u = fade(x), v = fade(y), w = fade(z);
  const A  = PERM[X] + Y;
  const AA = PERM[A] + Z;
  const AB = PERM[A + 1] + Z;
  const B  = PERM[X + 1] + Y;
  const BA = PERM[B] + Z;
  const BB = PERM[B + 1] + Z;
  return (
    (1 - w) * (
      (1 - v) * ((1 - u) * grad3(PERM[AA],     x,     y,     z)
                + u      * grad3(PERM[BA],     x - 1, y,     z))
      + v     * ((1 - u) * grad3(PERM[AB],     x,     y - 1, z)
                + u      * grad3(PERM[BB],     x - 1, y - 1, z))
    )
    + w * (
      (1 - v) * ((1 - u) * grad3(PERM[AA + 1], x,     y,     z - 1)
                + u      * grad3(PERM[BA + 1], x - 1, y,     z - 1))
      + v     * ((1 - u) * grad3(PERM[AB + 1], x,     y - 1, z - 1)
                + u      * grad3(PERM[BB + 1], x - 1, y - 1, z - 1))
    )
  );
}

function fbm2(x, y, z) {
  const a = noise3(x,        y,        z);
  const b = noise3(x * 2.13, y * 2.13, z * 2.13) * 0.5;
  return (a + b) / 1.5;
}

function smoothstep(a, b, x) {
  let t = (x - a) / (b - a);
  if (t < 0) t = 0; else if (t > 1) t = 1;
  return t * t * (3 - 2 * t);
}

// ---------- Viewport-driven sizing -----------------------------------------

const ambientEl = document.getElementById('ambient');
let COLS = 0, ROWS = 0;
let rowOut = [];
let CHAR_W = 7.2, LINE_H = 11.0;

function measureFont() {
  const probe = document.createElement('span');
  probe.style.position   = 'absolute';
  probe.style.visibility = 'hidden';
  probe.style.whiteSpace = 'pre';
  probe.style.font       = getComputedStyle(ambientEl).font;
  probe.textContent      = 'X'.repeat(100);
  document.body.appendChild(probe);
  const rect = probe.getBoundingClientRect();
  CHAR_W = rect.width / 100;
  LINE_H = rect.height;
  document.body.removeChild(probe);
}

function updateDimensions() {
  measureFont();
  // +1 cell of overflow each direction so the rendered text always
  // extends past the visible viewport — no chance of an empty strip
  // at the right or bottom from rounding.
  COLS = Math.max(20, Math.ceil(window.innerWidth  / CHAR_W) + 1);
  ROWS = Math.max(10, Math.ceil(window.innerHeight / LINE_H) + 1);
  rowOut = new Array(ROWS);
}

updateDimensions();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(updateDimensions, 180);
});

// ---------- Cloud scale + drift --------------------------------------------
// The cloud's feature size is anchored to the viewport (not to cell count),
// so clouds look the same size whether the user has a 13" laptop or a 4K
// monitor. NX/NY_PERIODS = "how many noise units across the viewport."
const NX_PERIODS = 4.8;
const NY_PERIODS = 3.0;

const DRIFT_Z = 0.038;
const DRIFT_X = 0.014;
const DRIFT_Y = 0.009;

let startTime    = performance.now();
let lastFrameTime = 0;

function renderFrame(now, frozen) {
  const t = (now - startTime) / 1000;

  const oz = t * DRIFT_Z;
  const ox = t * DRIFT_X;
  const oy = t * DRIFT_Y * 0.5 + Math.sin(t * 0.07) * 0.4;

  // Slowly sweeping directional light — gives the cloud a side that's
  // a touch brighter, wandering over minutes. Subtle, not dramatic.
  const sweep = t * 0.05;
  const lightAngle = Math.cos(sweep);

  const invC = 1 / (COLS - 1);
  const invR = 1 / (ROWS - 1);

  for (let r = 0; r < ROWS; r++) {
    const yFrac = r * invR;            // 0..1 across viewport
    const ny    = yFrac * NY_PERIODS + oy;
    let line = '';

    for (let c = 0; c < COLS; c++) {
      const xFrac = c * invC;          // 0..1 across viewport
      const nx    = xFrac * NX_PERIODS + ox;
      const sx    = xFrac * 2 - 1;      // -1..+1 (for light)

      // Two-octave fBm — the cloud body
      const body = fbm2(nx, ny, oz);

      // Threshold + contrast — pushes cells toward empty sky or bright core
      let d = smoothstep(-0.15, 0.55, body);

      // Soft directional brightness wash
      const lightMul = 0.78 + 0.22 * (1 - sx * lightAngle * 0.55);
      d *= lightMul;

      // Bayer dither — resolves continuous tone across the 50-letter ramp
      d += BAYER[(r & 7) * 8 + (c & 7)] / N_LEVELS;

      let idx = (d * N_LEVELS) | 0;
      if (idx < 0) idx = 0;
      else if (idx >= N_LEVELS) idx = N_LEVELS - 1;
      line += RAMP[idx];
    }
    rowOut[r] = line;
  }
  ambientEl.textContent = rowOut.join('\n');
}

// ---------- Loop -----------------------------------------------------------

const reduced =
  window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches
  && !new URLSearchParams(location.search).has('motion');

if (reduced) {
  startTime = performance.now();
  renderFrame(performance.now() + 8000, true);
} else {
  function loop(now) {
    if (now - lastFrameTime >= FRAME_INT_MS) {
      lastFrameTime = now;
      renderFrame(now, false);
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame((t) => {
    startTime = t;
    lastFrameTime = t;
    loop(t);
  });
}
</script>
</body>
</html>
