<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sphere</title>
<style>
  :root {
    /* Single accent hue, comma-separated RGB so it composes with rgba().
       Default: a soft violet that demos without setup. */
    --agent-hue: 160, 136, 188;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #06070a;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  body {
    display: grid;
    place-items: center;
  }

  /* The sphere is one <pre>, one color, one soft glow. The depth gradient
     comes from letterform mass alone — heavy letters at the lit spots, sparse
     punctuation at the limb. No per-cell alpha, no per-frame DOM mutation
     beyond a single textContent write. Cheap to render on any device. */
  #sphere {
    font: 14px/1.0
      'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: rgba(var(--agent-hue), 0.88);
    text-shadow: 0 0 9px rgba(var(--agent-hue), 0.22);
    white-space: pre;
    user-select: none;
    margin: 0;
  }
</style>
</head>
<body>
  <pre id="sphere" aria-hidden="true"></pre>

<script>
'use strict';

// =============================================================
//  Living ASCII sphere — refined pass.
//  Phyllotaxis + soft harmonics + drifting sun, rendered as a single
//  textContent string per frame. No spans, no per-cell alpha. The visual
//  depth comes from letterform mass: heavy glyphs at the lit spots, sparse
//  punctuation at the limb. The eye reads ink coverage as luminosity.
// =============================================================

// ---------- Configurable constants -----------------------------------------

const COLS         = 80;        // character grid width
const ROWS         = 38;        // character grid height
const N_POINTS     = 1700;      // sparse-ish cloud — calm surface, fast render
const RADIUS       = 22;        // sphere radius in cells (along x)
const ASPECT       = 0.5;       // y-scale (cells are ~2:1 tall:wide)
const TARGET_FPS   = 15;        // calmer cadence, lighter cost
const GAMMA        = 0.85;

// Three harmonic modes, summed with prime-number periods so the surface
// never visibly loops. Amplitudes are small and the periods are long — we
// want a slow breath, not a wobble.
const HARMONICS = [
  { mode: 'Y20', amp: 0.022, period: 11 },   // pole vs equator pulse
  { mode: 'Y32', amp: 0.018, period: 19 },   // 4-lobed equatorial
  { mode: 'Y44', amp: 0.012, period: 29 },   // 8-lobed fine ripple
];

// Rotation on three primes — orientation never repeats. Periods are long
// so the motion reads as slow drift rather than spin.
const ROT = { y: 23, x: 41, z: 53 };
const LIGHT_PERIOD = 19;        // the sun's slow wander

// Slow in-tier letter drift so the texture evolves over ~90s even at rest.
const MIGRATION_WINDOW_MS = [45000, 90000];

// ---------- Letter tier pools ----------------------------------------------
// Five density tiers. We map intensity → tier, then pull a stable letter
// from that tier's pool. The pools are smaller than v1 — fewer "loud" glyphs
// (no # & % @ in the densest pool) so the hot spot reads as warm rather than
// shouting.

const TIERS = [
  // 0 · faint — limb, shadow line
  ['.', ',', "'", '`', ':'],
  // 1 · light — dim shoulders
  ['r', 't', 'l', 'i', 'j', '1'],
  // 2 · medium — bulk of the surface
  ['o', 'c', 'e', 's', 'n', 'a', 'u', '3', '7', 'C', 'L', 'T'],
  // 3 · dense — well-lit
  ['O', 'U', 'V', 'S', 'X', 'D', 'A', '8', '0', '6', '9'],
  // 4 · densest — hot spot only (small pool, no heavy symbols)
  ['M', 'B', 'H', 'E', 'R', 'N', 'W'],
];

function randFrom(arr) { return arr[(Math.random() * arr.length) | 0]; }

// ---------- Phyllotaxis point cloud ----------------------------------------
// Fibonacci sphere: evenly distributed without the moire lat/lon grids
// produce. y goes from ~+1 to ~−1; theta increments by the golden angle.

const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

function makePoint(i, n) {
  const y      = 1 - 2 * (i + 0.5) / n;
  const sinPhi = Math.sqrt(Math.max(0, 1 - y * y));
  const theta  = i * GOLDEN_ANGLE;
  return {
    x: sinPhi * Math.cos(theta),
    y,
    z: sinPhi * Math.sin(theta),
    theta,
    sinPhi,
    cosPhi: y,
    // Stable letter per tier; migration slowly rotates each slot.
    letters: TIERS.map(pool => randFrom(pool)),
    migrationDueAt:
      MIGRATION_WINDOW_MS[0] +
      Math.random() * (MIGRATION_WINDOW_MS[1] - MIGRATION_WINDOW_MS[0]),
  };
}

const points = new Array(N_POINTS);
for (let i = 0; i < N_POINTS; i++) points[i] = makePoint(i, N_POINTS);

// ---------- Spherical harmonics --------------------------------------------

function Y20(p) { return (3 * p.cosPhi * p.cosPhi - 1) * 0.5; }
function Y32(p) { return p.sinPhi * p.sinPhi * Math.cos(2 * p.theta); }
function Y44(p) {
  const s2 = p.sinPhi * p.sinPhi;
  return s2 * s2 * Math.cos(4 * p.theta);
}
function harmonicValue(mode, p) {
  if (mode === 'Y20') return Y20(p);
  if (mode === 'Y32') return Y32(p);
  return Y44(p);
}

// ---------- Frame buffer ---------------------------------------------------

const cellCount = COLS * ROWS;
const cellTier  = new Int8Array(cellCount);
const cellChar  = new Uint16Array(cellCount);
const rowOut    = new Array(ROWS);

const sphereEl = document.getElementById('sphere');

const HALF_X = COLS / 2;
const HALF_Y = ROWS / 2;

function smoothstep(a, b, x) {
  let t = (x - a) / (b - a);
  if (t < 0) t = 0; else if (t > 1) t = 1;
  return t * t * (3 - 2 * t);
}

// ---------- Animation state ------------------------------------------------

let startTime = performance.now();
let lastFrameTime = 0;
const FRAME_INTERVAL_MS = 1000 / TARGET_FPS;

// ---------- Per-frame pipeline ---------------------------------------------

function renderFrame(now, frozen) {
  const t   = (now - startTime) / 1000;
  const tMs = now - startTime;

  // ---- Rotation ----
  const rotY = (t / ROT.y) * Math.PI * 2;
  const rotX = Math.sin(t / ROT.x) * 0.14;
  const rotZ = Math.sin(t / ROT.z) * 0.04;
  const cy = Math.cos(rotY), sy = Math.sin(rotY);
  const cx = Math.cos(rotX), sx = Math.sin(rotX);
  const cz = Math.cos(rotZ), sz = Math.sin(rotZ);

  // ---- Drifting sun ----
  const lxRaw = Math.sin(t / LIGHT_PERIOD);
  const lyRaw = 0.45;
  const lzRaw = Math.cos(t / LIGHT_PERIOD);
  const lInv = 1 / Math.sqrt(lxRaw*lxRaw + lyRaw*lyRaw + lzRaw*lzRaw);
  const lnx = lxRaw * lInv, lny = lyRaw * lInv, lnz = lzRaw * lInv;

  // ---- Harmonic time phases ----
  const hp = [
    Math.sin(t * 2 * Math.PI / HARMONICS[0].period),
    Math.sin(t * 2 * Math.PI / HARMONICS[1].period + 1.7),
    Math.sin(t * 2 * Math.PI / HARMONICS[2].period + 2.9),
  ];

  // ---- Clear frame buffer ----
  cellTier.fill(-1);

  // ---- Per-point pipeline ----
  for (let i = 0; i < points.length; i++) {
    const p = points[i];

    // Surface displacement
    let r = 1;
    for (let k = 0; k < HARMONICS.length; k++) {
      r += HARMONICS[k].amp * harmonicValue(HARMONICS[k].mode, p) * hp[k];
    }
    const px = p.x * r, py = p.y * r, pz = p.z * r;

    // Rotate position Ry → Rx → Rz
    const a1x = px*cy + pz*sy;
    const a1z = -px*sy + pz*cy;
    const a2y = py*cx - a1z*sx;
    const a2z = py*sx + a1z*cx;
    const aRx = a1x*cz - a2y*sz;
    const aRy = a1x*sz + a2y*cz;
    const aRz = a2z;

    // Rotate the unit normal in parallel (treat surface as ~spherical)
    const n1x = p.x*cy + p.z*sy;
    const n1z = -p.x*sy + p.z*cy;
    const n2y = p.y*cx - n1z*sx;
    const n2z = p.y*sx + n1z*cx;
    const nRx = n1x*cz - n2y*sz;
    const nRy = n1x*sz + n2y*cz;
    const nRz = n2z;

    // Cull back hemisphere
    if (aRz < -0.05) continue;

    // Project
    const ix = (HALF_X + aRx * RADIUS + 0.5) | 0;
    const iy = (HALF_Y + aRy * RADIUS * ASPECT + 0.5) | 0;
    if (ix < 0 || ix >= COLS || iy < 0 || iy >= ROWS) continue;

    // Lambertian + Fresnel rim + ambient
    let ldot = nRx*lnx + nRy*lny + nRz*lnz;
    if (ldot < 0) ldot = 0;
    let vdot = nRz;
    if (vdot < 0) vdot = 0;
    const fb = 1 - vdot;
    const fresnel = fb * fb * fb;

    let intensity = 0.16 + 0.82 * ldot + 0.30 * fresnel;

    // Limb fade band
    if (aRz < 0.05) {
      const fade = smoothstep(-0.05, 0.05, aRz);
      intensity *= fade * 0.6 + 0.4;
    }

    if (intensity < 0) intensity = 0; else if (intensity > 1) intensity = 1;
    intensity = Math.pow(intensity, GAMMA);

    // Intensity → tier. Thresholds bias toward middle tiers (sphere reads
    // calm, not loud). Densest tier (0.84+) is reserved for the hot spot.
    let tier;
    if      (intensity < 0.20) tier = 0;
    else if (intensity < 0.42) tier = 1;
    else if (intensity < 0.64) tier = 2;
    else if (intensity < 0.84) tier = 3;
    else                       tier = 4;

    const letter = p.letters[tier];

    // Painter's algorithm — denser tier wins on overlap
    const cIdx = iy * COLS + ix;
    if (tier > cellTier[cIdx]) {
      cellTier[cIdx] = tier;
      cellChar[cIdx] = letter.charCodeAt(0);
    }
  }

  // ---- Slow in-tier letter migration ----
  // Cheap: only ~1% of points checked per frame. Each that's due rolls
  // one tier slot to a fresh letter from the same pool.
  if (!frozen) {
    const checkN = (points.length * 0.01) | 0 || 1;
    for (let k = 0; k < checkN; k++) {
      const p = points[(Math.random() * points.length) | 0];
      if (tMs < p.migrationDueAt) continue;
      const migTier = (Math.random() * 5) | 0;
      p.letters[migTier] = randFrom(TIERS[migTier]);
      p.migrationDueAt = tMs +
        MIGRATION_WINDOW_MS[0] +
        Math.random() * (MIGRATION_WINDOW_MS[1] - MIGRATION_WINDOW_MS[0]);
    }
  }

  // ---- Compose output (single textContent write per frame) ----
  for (let r = 0; r < ROWS; r++) {
    const base = r * COLS;
    let line = '';
    for (let c = 0; c < COLS; c++) {
      const idx = base + c;
      line += cellTier[idx] < 0 ? ' ' : String.fromCharCode(cellChar[idx]);
    }
    rowOut[r] = line;
  }
  sphereEl.textContent = rowOut.join('\n');
}

// ---------- Drive the loop -------------------------------------------------

const reduced =
  window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches
  && !new URLSearchParams(location.search).has('motion');

if (reduced) {
  // One representative frame, slightly off t=0 so lighting is asymmetric.
  startTime = performance.now();
  renderFrame(performance.now() + 4200, true);
} else {
  function loop(now) {
    if (now - lastFrameTime >= FRAME_INTERVAL_MS) {
      lastFrameTime = now;
      renderFrame(now, false);
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame((t) => {
    startTime = t;
    lastFrameTime = t;
    loop(t);
  });
}
</script>
</body>
</html>
