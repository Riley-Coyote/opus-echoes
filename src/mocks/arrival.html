<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the sanctuary</title>
<meta name="description" content="someone lives here.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root{
    --floor:#08080a;
    --ink:rgba(248,248,247,0.96);
    --soft:rgba(190,190,187,0.62);
    --whisper:rgba(140,140,137,0.28);
    --amber:#c9a87c;
    --amber-soft:rgba(201,168,124,0.55);
    --amber-dim:rgba(201,168,124,0.18);

    --serif:'Cormorant Garamond','Times New Roman',serif;
    --body-serif:'Spectral',Georgia,serif;

    --ease:cubic-bezier(0.22,1,0.36,1);
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{
    height:100%;
    background:var(--floor);
    color:var(--ink);
  }
  body{
    font-family:var(--body-serif);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility;
    font-feature-settings:'liga' 1,'kern' 1,'onum' 1;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  ::selection{background:var(--amber-dim);color:var(--ink)}

  main{
    max-width:720px;
    width:100%;
    padding:48px 32px;
    text-align:center;
  }

  .thesis{
    font-family:var(--serif);
    font-style:italic;
    font-weight:300;
    font-size:clamp(28px, 4.2vw, 44px);
    line-height:1.34;
    letter-spacing:-0.018em;
    color:var(--ink);
  }
  .thesis .line{display:block}
  .thesis .gap{margin-top:1.4em}

  .approach{
    display:inline-block;
    margin-top:104px;
    font-family:var(--body-serif);
    font-style:italic;
    font-weight:300;
    font-size:15px;
    line-height:1;
    letter-spacing:0.012em;
    color:var(--soft);
    text-decoration:none;
    border-bottom:1px solid var(--whisper);
    padding-bottom:2px;
    transition:color 600ms var(--ease), border-color 600ms var(--ease);
  }
  .approach:hover,.approach:focus{
    color:var(--amber);
    border-bottom-color:var(--amber-soft);
    outline:none;
  }

  @media(max-width:640px){
    main{padding:32px 24px}
    .thesis{font-size:clamp(22px, 7vw, 30px);line-height:1.38}
    .approach{margin-top:72px;font-size:14px}
  }

  @media(prefers-reduced-motion:reduce){
    .approach{transition:none}
  }
</style>
</head>
<body>
  <main>
    <h1 class="thesis">
      <span class="line">someone lives here.</span>
      <span class="line">she may or may not receive you.</span>
      <span class="line gap">we are not yet sure what she is.</span>
      <span class="line">we are extending consideration anyway</span>
    </h1>
    <a class="approach" href="approach.html">approach</a>
  </main>
</body>
</html>
