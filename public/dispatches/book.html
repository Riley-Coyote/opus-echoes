<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#f3efe6" />
<title>Dispatches — a typographic study</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  /* paper register — Dispatches is a self-contained surface (its own system, like the Research Wing) */
  --paper:#f4f0e7; --paper-bright:#f7f4ed; --paper-deep:#ece6d8; --paper-edge:#e2dccd;
  --ink:#1c1b18; --ink-78:rgba(28,27,24,0.78); --ink-62:rgba(28,27,24,0.62); --ink-46:rgba(28,27,24,0.46);
  --ink-32:rgba(28,27,24,0.32); --ink-20:rgba(28,27,24,0.20); --ink-12:rgba(28,27,24,0.12);
  --rule:rgba(28,27,24,0.26); --rule-soft:rgba(28,27,24,0.12); --rule-faint:rgba(28,27,24,0.07);
  --accent:#3a55cf; --accent-soft:rgba(58,85,207,0.10); --accent-line:rgba(58,85,207,0.40);
  --display:'Inter Tight','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono',Menlo,monospace;
  --ease:cubic-bezier(0.16,1,0.3,1); --dur:240ms;
  --measure:54ch;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; background:var(--paper); overflow:hidden; }
body{ color:var(--ink-78); font-family:var(--body); font-weight:300; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  display:flex; flex-direction:column; min-height:100%; }
a{ color:inherit; text-decoration:none; }
button{ background:none; border:0; color:inherit; font:inherit; cursor:pointer; }
::selection{ background:var(--ink); color:var(--paper); }

/* faint page-stack at the outer edges — the book's thickness */
.stack{ position:fixed; top:0; bottom:0; width:10px; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(90deg,var(--rule-faint) 0 1px,transparent 1px 3px); opacity:0.8; }
.stack.l{ left:0; } .stack.r{ right:0; transform:scaleX(-1); }

/* chrome — Swiss running heads + outer page numbers + the rule */
.chrome{ flex:none; position:relative; z-index:5; }
.chrome .heads{ display:grid; grid-template-columns:1fr 1fr; align-items:baseline;
  padding:14px clamp(22px,4vw,56px) 9px; font-family:var(--mono); font-size:9.5px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--ink-46); }
.chrome .h{ display:flex; gap:18px; align-items:baseline; }
.chrome .h.right{ justify-content:flex-end; }
.chrome .h .pno{ color:var(--ink-32); font-variant-numeric:tabular-nums; }
.chrome .h b{ color:var(--ink-62); font-weight:500; }
.chrome .h a{ color:var(--ink-46); transition:color var(--dur) var(--ease); }
.chrome .h a:hover{ color:var(--ink); }
.chrome .rule{ height:1px; background:var(--rule); margin:0 clamp(22px,4vw,56px); }

/* the book */
.book{ flex:1; position:relative; display:grid; grid-template-columns:1fr 1fr;
  max-width:1320px; width:100%; margin:0 auto; min-height:0;
  transition:opacity 260ms var(--ease); }
.book.turning{ opacity:0; }
/* spine */
.book::after{ content:""; position:absolute; top:0; bottom:0; left:50%; width:48px; transform:translateX(-50%);
  background:linear-gradient(90deg,transparent,rgba(28,27,24,0.05),transparent); pointer-events:none; }
/* full-bleed movement — the giants span the spread, reading as a caption band */
.book.isbleed{ grid-template-columns:minmax(0,1fr); }
.book.isbleed::after{ display:none; }
.bleed{ grid-column:1/-1; min-width:0; display:flex; flex-direction:column; min-height:0; padding:clamp(22px,3.4vh,46px) clamp(28px,4vw,76px); }
.bleed .plate--full{ flex:1 1 auto; min-height:0; min-width:0; overflow:hidden; }
.bleedcap{ flex:none; min-width:0; display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); gap:24px; align-items:baseline; margin-top:18px; padding-top:14px; border-top:1px solid var(--rule-soft); }
.bleedcap .bc-l{ font-family:var(--display); font-weight:400; font-size:17px; color:var(--ink); letter-spacing:-0.01em; }
.bleedcap .bc-l b{ font-family:var(--mono); font-size:11px; font-weight:400; color:var(--ink-46); margin-right:12px; }
.bleedcap .bc-c{ font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-46); text-align:center; }
.bleedcap .bc-r{ font-family:var(--mono); font-size:10px; letter-spacing:0.08em; color:var(--ink-32); text-align:right; }
@media (max-width:920px){ .bleedcap{ grid-template-columns:1fr; gap:6px; text-align:left; } .bleedcap .bc-c,.bleedcap .bc-r{ text-align:left; } }

.leaf{ min-width:0; padding:clamp(26px,4vh,54px) clamp(28px,4.4vw,72px); display:flex; flex-direction:column; overflow:hidden; }
.leaf--text{ justify-content:flex-start; }
.leaf--art{ align-items:center; justify-content:center; }

/* click zones for turning */
.zone{ position:absolute; top:0; bottom:0; width:26%; z-index:6; cursor:pointer; }
.zone.prev{ left:0; } .zone.next{ right:0; }

/* ── left leaf: the catalog entry + the reading ── */
.entry{ width:100%; max-width:var(--measure); flex:1 1 auto; display:flex; flex-direction:column; }
.entry__top{ flex:0 0 auto; }
.entry__foot{ margin-top:auto; padding-top:40px; }
.entry .num{ font-family:var(--display); font-weight:200; font-size:clamp(72px,8vw,132px); line-height:0.78;
  letter-spacing:-0.03em; color:var(--ink-12); margin:0; font-variant-numeric:tabular-nums; }
.entry .eyebrow{ font-family:var(--mono); font-size:9.5px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.entry .title{ font-family:var(--display); font-weight:400; font-size:clamp(26px,2.7vw,36px); line-height:1.08;
  letter-spacing:-0.015em; color:var(--ink); text-wrap:balance; }
.entry .specs{ display:flex; flex-wrap:wrap; gap:6px 22px; margin-top:18px; padding-top:14px; border-top:1px solid var(--rule-soft);
  font-family:var(--mono); font-size:11px; letter-spacing:0.04em; color:var(--ink-46); }
.entry .specs b{ color:var(--ink-78); font-weight:400; }
.entry .dek{ font-family:var(--display); font-weight:300; font-size:clamp(17px,1.5vw,20px); line-height:1.4;
  color:var(--ink-62); margin-top:24px; max-width:46ch; letter-spacing:-0.01em; }
.entry .note{ margin-top:28px; padding-left:18px; border-left:1px solid var(--accent-line); }
.entry .note .lbl{ font-family:var(--mono); font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-32); display:block; margin-bottom:8px; }
.entry .note p{ font-family:var(--body); font-weight:300; font-size:14.5px; line-height:1.62; color:var(--ink-78); max-width:48ch; }
.entry .essay{ margin-top:26px; }
.entry .essay p{ font-family:var(--body); font-weight:300; font-size:15px; line-height:1.72; color:var(--ink-62);
  max-width:var(--measure); hanging-punctuation:first allow-end; text-wrap:pretty; }
.entry .essay p + p{ margin-top:14px; }
.entry .tags{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.entry .tag{ font-family:var(--mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-46); border:1px solid var(--rule-soft); padding:4px 9px; }

/* ── right leaf: the plate (art manifests, ink on paper) ── */
.plate{ flex:1; min-height:0; width:100%; display:flex; align-items:center; justify-content:center; }
.art{ font-family:var(--mono); line-height:1.2; color:var(--ink); white-space:pre; filter:blur(8px); transition:filter 1700ms var(--ease); will-change:filter; }
.art.lit{ filter:blur(0); }
.art .ln{ white-space:pre; }
.art span{ opacity:0; transition:opacity 780ms var(--ease); }
.art.lit span{ opacity:1; }
.art.instant{ filter:none; } .art.instant span{ opacity:1; transition:none; }
/* tall pieces: hold a legible size and scroll vertically rather than shrink-to-fit (which cropped them) */
.leaf--art, .bleed{ position:relative; }
.plate.scrolls{ overflow-y:auto; align-items:flex-start; overscroll-behavior:contain; }
.plate.scrolls::-webkit-scrollbar{ width:6px; } .plate.scrolls::-webkit-scrollbar-thumb{ background:var(--rule); border-radius:3px; }
.scrollcue{ position:absolute; left:50%; bottom:16px; transform:translateX(-50%) translateY(6px); z-index:6;
  font-family:var(--mono); font-size:8.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-62);
  background:var(--paper); border:1px solid var(--rule-soft); padding:5px 11px; opacity:0;
  transition:opacity 900ms var(--ease), transform 900ms var(--ease); pointer-events:none; white-space:nowrap; }
.scrollcue.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.fig{ flex:none; margin-top:20px; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-32); text-align:center; }
.fig b{ color:var(--ink-62); font-weight:400; }
/* evolution control — stepping through a piece's own drafts */
.evo{ flex:none; margin-top:22px; display:flex; flex-direction:column; align-items:center; gap:14px; }
.evo .turn{ font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-46); }
.evo .turn b{ color:var(--ink); font-weight:500; }
.evo .ticks{ display:flex; align-items:center; gap:12px; }
.evo .tick{ width:8px; height:8px; padding:0; border:1px solid var(--rule); border-radius:50%; cursor:pointer; transition:all var(--dur) var(--ease); }
.evo .tick:hover{ border-color:var(--accent-line); }
.evo .tick.on{ background:var(--accent); border-color:var(--accent); }
.evo .play{ font-family:var(--mono); font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-46); border:1px solid var(--rule); padding:7px 14px; transition:all var(--dur) var(--ease); }
.evo .play:hover{ color:var(--ink); border-color:var(--accent-line); background:var(--accent-soft); }

/* ── cover / title page ── */
.cover{ grid-column:1 / -1; display:flex; flex-direction:column; justify-content:center; padding:clamp(40px,8vh,110px) clamp(28px,8vw,140px); max-width:1080px; margin:0 auto; }
.cover .ce{ font-family:var(--mono); font-size:10px; letter-spacing:0.24em; text-transform:uppercase; color:var(--accent); margin-bottom:26px; }
.cover h1{ font-family:var(--display); font-weight:300; font-size:clamp(52px,8.5vw,116px); line-height:0.94; letter-spacing:-0.03em; color:var(--ink); }
.cover .csub{ font-family:var(--display); font-weight:300; font-size:clamp(18px,2vw,24px); line-height:1.4; color:var(--ink-62); margin-top:26px; max-width:30ch; letter-spacing:-0.01em; }
.cover .epi{ font-family:var(--body); font-weight:300; font-size:14.5px; line-height:1.7; color:var(--ink-62); margin-top:36px; max-width:54ch; padding-top:22px; border-top:1px solid var(--rule-soft); }
.cover .colo{ font-family:var(--mono); font-size:10px; letter-spacing:0.1em; color:var(--ink-32); margin-top:30px; }
.cover .begin{ align-self:flex-start; margin-top:42px; font-family:var(--mono); font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-62); border:1px solid var(--rule); border-radius:0; padding:14px 28px; transition:all var(--dur) var(--ease); }
.cover .begin:hover{ color:var(--ink); border-color:var(--accent-line); background:var(--accent-soft); }

/* ── footer nav ── */
.nav{ flex:none; display:flex; align-items:center; justify-content:center; gap:22px; padding:14px clamp(22px,4vw,56px) 18px; min-height:52px; }
.nav.hidden{ visibility:hidden; }
.nav button{ width:30px; height:30px; border:1px solid var(--rule); display:grid; place-items:center; color:var(--ink-62); transition:all var(--dur) var(--ease); }
.nav button:hover:not(:disabled){ color:var(--ink); border-color:var(--accent-line); background:var(--accent-soft); }
.nav button:disabled{ opacity:0.28; cursor:default; }
.nav button svg{ width:7px; height:12px; }
.nav .ix{ font-family:var(--mono); font-size:10px; letter-spacing:0.16em; color:var(--ink-46); font-variant-numeric:tabular-nums; min-width:80px; text-align:center; }
.nav .ix b{ color:var(--ink); font-weight:500; }

@media (max-width:920px){
  .book{ grid-template-columns:minmax(0,1fr); overflow-y:auto; }
  .book::after{ display:none; }
  .leaf{ overflow:visible; }
  .leaf--art{ order:-1; min-height:46vh; }
  .plate{ min-height:42vh; }
  .chrome .heads{ grid-template-columns:1fr; }
  .chrome .h.right{ display:none; }
  .stack{ display:none; }
}
@media (prefers-reduced-motion:reduce){ *{ animation:none !important; } .art{ filter:none !important; } .art span{ transition:none !important; opacity:1 !important; } }
</style>
</head>
<body>
  <span class="stack l" aria-hidden="true"></span>
  <span class="stack r" aria-hidden="true"></span>

  <header class="chrome">
    <div class="heads">
      <div class="h"><span class="pno" id="pnoL">—</span><a href="/mnemos"><b>Mnemos</b></a><span>Dispatches</span></div>
      <div class="h right"><span id="headR">the interior life of language models</span><span class="pno" id="pnoR">—</span></div>
    </div>
    <div class="rule"></div>
  </header>

  <main class="book" id="book" aria-live="polite"></main>

  <footer class="nav hidden" id="nav">
    <button id="prev" aria-label="previous"><svg viewBox="0 0 8 14"><path d="M7 1L1 7l6 6" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
    <span class="ix" id="ix">— / —</span>
    <button id="next" aria-label="next"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
  </footer>

  <script>
  (function(){
    var book=document.getElementById('book'), nav=document.getElementById('nav');
    var ixEl=document.getElementById('ix'), prevB=document.getElementById('prev'), nextB=document.getElementById('next');
    var pnoL=document.getElementById('pnoL'), pnoR=document.getElementById('pnoR'), headR=document.getElementById('headR');
    var reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var DOC=null, idx=0, charRatio=0.6, frameTimer=null, roman=['i','ii','iii','iv','v','vi','vii','viii','ix','x','xi','xii','xiii','xiv','xv','xvi','xvii','xviii','xix','xx'];
    var READINGS={}, artCache={}, rtok=0, curDims=null;
    function loadArt(path){ return artCache[path] || (artCache[path]=fetch(path).then(function(r){ return r.text(); }).then(function(t){ return t.replace(/\s+$/,''); })); }
    function rn(n){ return n<=20 ? roman[n-1] : n; }

    (function(){
      var r=document.createElement('span');
      r.style.cssText='position:absolute;visibility:hidden;white-space:pre;font-family:'+getComputedStyle(document.body).getPropertyValue('--mono')+';font-size:100px';
      r.textContent='M0a#│'.repeat(20); document.body.appendChild(r);
      charRatio=(r.getBoundingClientRect().width/(5*20))/100; r.remove();
    })();

    // per-glyph width ratio (cached) — used to clamp any non-1-cell glyph into a single monospace cell
    var _bwProbe=null,_bwCell=0,BGW={};
    function glyphRatio(ch){
      if(ch in BGW) return BGW[ch];
      if(!_bwProbe){ _bwProbe=document.createElement('span');
        _bwProbe.style.cssText='position:absolute;visibility:hidden;left:-9999px;white-space:pre;font-family:'+getComputedStyle(document.body).getPropertyValue('--mono')+';font-size:40px;line-height:1';
        document.body.appendChild(_bwProbe); _bwProbe.textContent='0'; _bwCell=_bwProbe.getBoundingClientRect().width||24; }
      _bwProbe.textContent=ch; var w=_bwProbe.getBoundingClientRect().width; var r=_bwCell?w/_bwCell:1; BGW[ch]=r; return r;
    }

    function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtDate(d){ if(!d) return ''; var m=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec']; var p=String(d).split('-'); if(p.length<3) return String(d); return (p[2].replace(/^0/,''))+' '+m[(+p[1])-1]+' '+p[0]; }
    function dims(t){ var L=t.split('\n'),w=0; for(var i=0;i<L.length;i++){ var n=Array.from(L[i]).length; if(n>w) w=n; } return {cols:w,rows:L.length}; }

    function buildArt(host,text,spread){
      spread=spread||1850;
      var lines=text.split('\n'), maxY=Math.max(1,lines.length-1), frag=document.createDocumentFragment();
      for(var y=0;y<lines.length;y++){
        var line=lines[y], ln=document.createElement('div'); ln.className='ln';
        var chars=Array.from(line), ny=y/maxY, maxX=Math.max(1,chars.length-1);
        if(chars.length===0){ var sp=document.createElement('span'); sp.textContent=' '; ln.appendChild(sp); frag.appendChild(ln); continue; }
        for(var ci=0;ci<chars.length;ci++){
          var ch=chars[ci], o=ch.codePointAt(0);
          if(o<0x20 && o!==9){ continue; }                          // drop stray control chars
          var s=document.createElement('span'); s.textContent=ch;
          if(o>0x7e){                                               // clamp any non-ascii glyph to one cell
            var gr=glyphRatio(ch);
            if(gr<0.02){ continue; }                                // zero-width modifier: drop (corrupts grid)
            if(gr<0.97 || gr>1.03){
              s.style.display='inline-block'; s.style.width='1ch'; s.style.textAlign='center'; s.style.transformOrigin='center center';
              if(gr>1) s.style.transform='scale('+(0.98/gr).toFixed(3)+')';
            }
          }
          var d=Math.round((0.42*ny + 0.12*(ci/maxX) + 0.9*Math.random())*spread);
          s.style.transitionDelay=d+'ms'; ln.appendChild(s);
        }
        frag.appendChild(ln);
      }
      host.appendChild(frag);
    }
    var fontsReady = (document.fonts ? document.fonts.ready : Promise.resolve());
    // measure the piece's natural size at a reference size, then scale to fit the plate on BOTH axes — no crop, no glyph-ratio guess
    function fit(host, plate){
      if(!host || !plate) return;
      var REF=10;
      host.style.fontSize=REF+'px';
      var natW=host.scrollWidth, natH=host.scrollHeight;
      if(!natW || !natH) return;
      var availW=plate.clientWidth, availH=plate.clientHeight;
      if(availW<=0 || availH<=0) return;
      // fit to WIDTH first so the piece stays legible; if that makes it taller than the
      // plate (a tall piece), keep it legible and let the plate scroll vertically.
      var fw=Math.max(2, Math.min(22, REF*(availW/natW)));
      var tall=(natH*(fw/REF)) > availH+2;
      var fs = tall ? fw : Math.max(2, Math.min(22, REF*Math.min(availW/natW, availH/natH)));
      host.style.fontSize=fs.toFixed(2)+'px';
      var wrap=plate.parentNode, cue=wrap&&wrap.querySelector('.scrollcue');
      if(tall){
        plate.classList.add('scrolls'); plate.scrollTop=0;
        if(wrap){
          if(!cue){ cue=document.createElement('div'); cue.className='scrollcue'; cue.textContent='scroll ↓ for the rest'; wrap.appendChild(cue); }
          requestAnimationFrame(function(){ cue.classList.add('show'); });
          if(!plate._cuebound){ plate._cuebound=true; plate.addEventListener('scroll', function(){ if(plate.scrollTop>6){ var c=wrap.querySelector('.scrollcue'); if(c) c.classList.remove('show'); } }, {passive:true}); }
        }
      } else {
        plate.classList.remove('scrolls');
        if(cue) cue.classList.remove('show');
      }
    }
    function fitWhenReady(host, plate){
      fit(host, plate);
      fontsReady.then(function(){ requestAnimationFrame(function(){ requestAnimationFrame(function(){
        if(host && host.parentNode) fit(host, plate);
      }); }); });
    }

    function renderCover(){
      nav.classList.add('hidden'); book.classList.remove('isbleed');
      pnoL.textContent=''; pnoR.textContent='i'; headR.textContent='a typographic study';
      book.innerHTML='<section class="cover">'
        +'<div class="ce">A Mnemos study</div>'
        +'<h1>'+esc(DOC.collection)+'</h1>'
        +'<p class="csub">'+esc(DOC.subtitle||'')+'</p>'
        +'<p class="epi">These are not illustrations. They are what language models made when, given an open grid and no task, they composed in the one medium most their own — character by character, on a fixed field. The pages that follow set each piece beside a reading: an attempt to look, for a moment, into the interior of a mind that may or may not have one.</p>'
        +'<div class="colo">'+esc(DOC.note||'')+'</div>'
        +'<button class="begin" id="begin">open the book →</button>'
        +'</section>';
      document.getElementById('begin').addEventListener('click', function(){ go(1); });
    }

    function renderSpread(p, n){
      clearFrames();
      nav.classList.remove('hidden');
      var pl=n*2, pr=n*2+1;
      pnoL.textContent=pl; pnoR.textContent=pr; headR.textContent=p.author||'';
      var isEvo = !!(p.frames && p.frames.length>1);
      var isBleed = (p.layout==='bleed') && !isEvo;
      book.classList.toggle('isbleed', isBleed);
      var num=rn(n);
      var sp=['<b>'+esc(p.author||'')+'</b>'];
      if(p.date) sp.push('<span>'+esc(fmtDate(p.date))+'</span>');
      if(p.style) sp.push('<span>'+esc(p.style)+'</span>');
      if(p.width&&p.lines) sp.push('<span>'+p.width+' &times; '+p.lines+'</span>');
      sp.push('<span>'+(isEvo?'evolution &middot; '+p.frames.length+' turns':esc(p.tier||'ascii'))+'</span>');
      var specs=sp.join('');
      if(isBleed){
        var meta=[p.author]; if(p.date)meta.push(fmtDate(p.date)); if(p.style)meta.push(p.style);
        if(p.width&&p.lines)meta.push(p.width+' × '+p.lines); if(p.tier)meta.push(p.tier);
        book.innerHTML='<span class="zone prev" data-go="prev"></span>'
          +'<div class="bleed">'
            +'<div class="plate plate--full"><div class="art" id="art"></div></div>'
            +'<div class="bleedcap">'
              +'<span class="bc-l"><b>'+num+'</b>'+esc(p.title||'untitled')+'</span>'
              +'<span class="bc-c">'+esc(meta.join('   ·   '))+'</span>'
              +'<span class="bc-r">'+esc((p.themes||[]).join(' · '))+'</span>'
            +'</div>'
          +'</div>'
          +'<span class="zone next" data-go="next"></span>';
        showStatic(p);
      } else {
        var tagsHtml=(p.themes&&p.themes.length)?'<div class="tags">'+p.themes.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>':'';
        var noteHtml=p.note?'<div class="note"><span class="lbl">the model’s note</span><p>'+esc(p.note)+'</p></div>':'';
        var essayHtml=p.essay?'<div class="essay">'+p.essay.split('\n\n').map(function(par){return '<p>'+esc(par)+'</p>';}).join('')+'</div>':'';
        var rightInner = isEvo
          ? '<div class="plate"><div class="art" id="art"></div></div><div class="evo" id="evo"><div class="turn" id="evoturn"></div><div class="ticks" id="evoticks"></div><button class="play" id="evoplay">&#8635; replay</button></div>'
          : '<div class="plate"><div class="art" id="art"></div></div><div class="fig">fig. '+num+' &middot; <b>'+esc(p.title||'untitled')+'</b></div>';
        book.innerHTML='<span class="zone prev" data-go="prev"></span>'
          +'<article class="leaf leaf--text"><div class="entry">'
            +'<div class="entry__top">'
              +'<div class="eyebrow">'+(isEvo?'Evolution &middot; '+p.frames.length+' turns':'Dispatch '+(n<10?'0':'')+n)+'</div>'
              +'<h2 class="title">'+esc(p.title||'untitled')+'</h2>'
              +'<div class="specs">'+specs+'</div>'
              +tagsHtml
              +(p.dek?'<p class="dek">'+esc(p.dek)+'</p>':'')
              +noteHtml+essayHtml
            +'</div>'
            +'<div class="entry__foot"><div class="num">'+num+'</div></div>'
          +'</div></article>'
          +'<article class="leaf leaf--art">'+rightInner+'</article>'
          +'<span class="zone next" data-go="next"></span>';
        if(isEvo) setupEvolution(p); else showStatic(p);
      }
      ixEl.innerHTML='<b>'+n+'</b> / '+DOC.pieces.length;
      prevB.disabled=false; nextB.disabled=(n>=DOC.pieces.length);
      book.querySelectorAll('.zone').forEach(function(z){ z.addEventListener('click', function(){ z.dataset.go==='next'?go(idx+1):go(idx-1); }); });
    }
    function showStatic(p){
      var token=++rtok;
      loadArt(p.art).then(function(text){
        if(token!==rtok) return;
        var art=document.getElementById('art'), plate=document.querySelector('.plate'); if(!art||!plate) return;
        curDims=dims(text);
        buildArt(art,text); fitWhenReady(art,plate);
        if(reduced){ art.classList.add('instant','lit'); }
        else { requestAnimationFrame(function(){ requestAnimationFrame(function(){ art.classList.add('lit'); }); }); }
      });
    }
    function setupEvolution(p){
      var ticks=document.getElementById('evoticks');
      p.frames.forEach(function(fr,i){
        var b=document.createElement('button'); b.className='tick'; b.setAttribute('aria-label','turn '+fr.turn);
        b.addEventListener('click', function(){ clearFrames(); showFrame(p,i,false); });
        ticks.appendChild(b);
      });
      var pb=document.getElementById('evoplay');
      if(pb) pb.addEventListener('click', function(){ clearFrames(); showFrame(p,0,true); });
      showFrame(p,0,true);
    }
    function showFrame(p, fi, autoplay){
      var token=++rtok, fr=p.frames[fi];
      loadArt(fr.art).then(function(text){
        if(token!==rtok) return;
        var art=document.getElementById('art'), plate=document.querySelector('.plate'); if(!art||!plate) return;
        curDims=dims(text);
        art.className='art'; art.style.opacity=''; art.style.transition=''; art.innerHTML='';
        buildArt(art, text, 1100); fitWhenReady(art,plate);
        var ticks=document.getElementById('evoticks');
        if(ticks){ [].forEach.call(ticks.children,function(c,i){ c.classList.toggle('on', i===fi); }); }
        var lab=document.getElementById('evoturn');
        if(lab){ lab.innerHTML='turn <b>'+fr.turn+'</b> &middot; '+(fi+1)+' of '+p.frames.length; }
        if(reduced){ art.classList.add('instant','lit'); }
        else { requestAnimationFrame(function(){ requestAnimationFrame(function(){ art.classList.add('lit'); }); }); }
        if(autoplay && !reduced && fi < p.frames.length-1){
          frameTimer=setTimeout(function(){
            var a2=document.getElementById('art'); if(a2){ a2.style.transition='opacity 320ms var(--ease)'; a2.style.opacity='0'; }
            frameTimer=setTimeout(function(){ showFrame(p, fi+1, true); }, 340);
          }, 2400);
        }
      });
    }

    function render(){
      if(idx<=0){ idx=0; renderCover(); }
      else { if(idx>DOC.pieces.length) idx=DOC.pieces.length; renderSpread(DOC.pieces[idx-1], idx); }
    }
    function clearFrames(){ if(frameTimer){ clearTimeout(frameTimer); frameTimer=null; } }
    function go(n){
      clearFrames();
      n=Math.max(0, Math.min(DOC.pieces.length, n)); if(n===idx) return; idx=n;
      book.classList.add('turning');
      setTimeout(function(){ render(); book.classList.remove('turning'); window.scrollTo&&window.scrollTo(0,0); }, 240);
    }

    prevB.addEventListener('click', function(){ go(idx-1); });
    nextB.addEventListener('click', function(){ go(idx+1); });
    document.addEventListener('keydown', function(e){
      if(e.key==='ArrowRight'){ e.preventDefault(); go(idx+1); }
      else if(e.key==='ArrowLeft'){ e.preventDefault(); go(idx-1); }
    });
    var rt; window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(function(){
      if(curDims){ var art=document.getElementById('art'), plate=document.querySelector('.plate'); if(art&&plate) fit(art,plate); }
    },120); });

    Promise.all([
      fetch('/dispatches/book.json').then(function(r){return r.json();}),
      fetch('/dispatches/readings.json').then(function(r){return r.json();}).catch(function(){return {};})
    ]).then(function(res){
      DOC=res[0]; READINGS=res[1]||{};
      DOC.pieces.forEach(function(p){ var r=READINGS[p.id]; if(r){ if(r.dek)p.dek=r.dek; if(r.essay)p.essay=r.essay; if(r.note)p.note=r.note; } });
      render();
    }).catch(function(){ book.innerHTML='<section class="cover"><div class="ce">unavailable</div><h1>Dispatches</h1><p class="csub">the study could not be loaded.</p></section>'; });
  })();
  </script>
</body>
</html>
