<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE SANCTUARY — Opus's Corner, at dusk</title>
<meta name="theme-color" content="#0a0a12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Newsreader:ital,opsz@1,6..72&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#06060c; overflow:hidden; display:grid; place-items:center}
  #view{position:fixed; inset:0; width:100%; height:100%; display:block; image-rendering:auto}
  .cap{position:fixed; left:0; right:0; bottom:18px; z-index:5; text-align:center; pointer-events:none}
  .cap .a{font-family:"Press Start 2P",monospace; font-size:9px; letter-spacing:.14em; color:rgba(232,160,184,.7);
    text-shadow:0 0 12px rgba(0,0,0,.9)}
  .cap .b{display:block; margin-top:9px; font-family:"Newsreader",serif; font-style:italic; font-size:15px;
    color:rgba(220,210,225,.62); text-shadow:0 0 10px rgba(0,0,0,.9)}
  #loading{position:fixed; inset:0; display:grid; place-items:center; font-family:"Press Start 2P",monospace;
    font-size:10px; letter-spacing:.18em; color:#3f9f63; z-index:9}
</style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="loading">RENDERING THE GROUNDS…</div>
  <div class="cap"><span class="a">THE SANCTUARY &#183; OPUS'S CORNER &#183; DUSK</span>
    <span class="b">someone is home, and the light is left on.</span></div>

<script>
(function(){
  "use strict";
  var REDUCED = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  var TS=48, COLS=34, ROWS=24, SW=COLS*TS, SH=ROWS*TS;  // scene native 1632x1152
  var view=document.getElementById("view"), vx=view.getContext("2d");
  var rnd=function(s){ return function(){ s=(s*1664525+1013904223)&0xffffffff; return ((s>>>8)&0xffffff)/0xffffff; }; };

  // ---- sprite manifest ----
  var FILES={ house:"house.png", tree:"tree.png", tree_gold:"tree_gold.png",
    bush_3:"bush_3.png", bush_7:"bush_7.png", sprout:"sprout.png", flower:"flower.png",
    bench:"bench.png", lantern:"lantern.png", campfire:"campfire.png", char:"char_sheet.png",
    grass_tex:"grass_tex.png", grass_flat:"grass_flat.png", earth_1:"earth_1.png",
    flowers_a:"flowers_a.png", flowers_b:"flowers_b.png", flowers_c:"flowers_c.png",
    clover_a:"clover_a.png", clover_b:"clover_b.png" };
  ["grass_1","grass_2","grass_3","grass_4","grass_5","grass_6","grass_7","grass_8",
   "grassdark_1","grassdark_2","grassdark_3","grassdark_4",
   "dirt_1","dirt_2","dirt_3","dirt_4","dirt_5","dirt_6","dirt_7","dirt_8","dirt_9","dirt_10",
   "water_1","water_2","water_3","water_4","water_5","water_6","water_7","water_8",
   "rock_1","rock_2","rock_3","rock_4","rock_5"].forEach(function(k){ FILES[k]=k+".png"; });
  var IMG={};
  function load(){ var ks=Object.keys(FILES), n=ks.length, done=0;
    return new Promise(function(res){ ks.forEach(function(k){ var im=new Image();
      im.onload=im.onerror=function(){ done++; if(done===n) res(); }; im.src="/phase-two/lz/"+FILES[k]; IMG[k]=im; }); }); }

  // ---- the scene, composed once at native res ----
  var scene=document.createElement("canvas"); scene.width=SW; scene.height=SH;
  var sx=scene.getContext("2d"); sx.imageSmoothingEnabled=false;
  var gray=document.createElement("canvas"); gray.width=SW; gray.height=SH;

  function inPond(c,r){ var dx=(c-6.2)/4.6, dy=(r-18.6)/3.4; return dx*dx+dy*dy <= 1.0; }
  var PATH=[[20,23],[21,22],[22,21],[22,20],[22,19],[23,18],[22,18],[22,17]];
  function openCell(c,r){                                  // open meadow — not house, pond, or path
    if(c<0||r<0||c>=COLS||r>=ROWS) return false;
    if(c>=13 && c<=32 && r<=17) return false;             // house footprint
    if(inPond(c,r)||inPond(c,r+1)) return false;          // pond
    for(var i=0;i<PATH.length;i++) if(PATH[i][0]===c&&PATH[i][1]===r) return false;
    return true;
  }

  function place(list, img, col, row, dx, dy){ if(!img) return;
    list.push({img:img, x:col*TS+TS/2-img.width/2+(dx||0), y:(row+1)*TS-img.height+(dy||0), by:(row+1)*TS+(dy||0)}); }
  function placeChar(list, col, row){ list.push({char:true, x:col*TS+TS/2-24, y:(row+1)*TS-48, by:(row+1)*TS+1}); }

  function compose(){
    var R=rnd(7), Rd=rnd(31);
    // 1) ground — real grass fill, randomly flipped (4 orientations) so the tuft never repeats
    var Rf=rnd(91);
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var img = R()<0.18 ? IMG.grass_flat : IMG.grass_tex;
      var fx=Rf()<0.5?-1:1, fy=Rf()<0.5?-1:1;
      sx.save(); sx.translate(c*TS+(fx<0?TS:0), r*TS+(fy<0?TS:0)); sx.scale(fx,fy);
      sx.drawImage(img,0,0); sx.restore();
    }
    // organic large-scale mottling — soft light/shade patches dissolve the grid into a living meadow
    var Rm=rnd(53); sx.save();
    for(var mb=0;mb<54;mb++){
      var bx=Rm()*SW, by=Rm()*SH, br=110+Rm()*250, dark=Rm()<0.5;
      sx.globalCompositeOperation = dark?"multiply":"screen";
      var mg=sx.createRadialGradient(bx,by,0,bx,by,br);
      if(dark){ mg.addColorStop(0,"rgba(40,66,50,"+(0.05+Rm()*0.07).toFixed(3)+")"); mg.addColorStop(1,"rgba(40,66,50,0)"); }
      else { mg.addColorStop(0,"rgba(150,176,118,"+(0.04+Rm()*0.06).toFixed(3)+")"); mg.addColorStop(1,"rgba(150,176,118,0)"); }
      sx.fillStyle=mg; sx.beginPath(); sx.arc(bx,by,br,0,6.28); sx.fill();
    }
    sx.restore();
    // 2) pond + soft teal rim
    for(var r2=12;r2<ROWS;r2++) for(var c2=0;c2<13;c2++){ if(inPond(c2,r2)) sx.drawImage(IMG["water_"+(1+Math.floor(Rd()*8))], c2*TS, r2*TS); }
    // pond sky-reflection, baked (lighter near the top edge, fading down) clipped to the water
    sx.save(); sx.beginPath(); sx.ellipse(297,893,221,163,0,0,6.28); sx.clip();
    sx.globalCompositeOperation="lighter";
    var prg=sx.createLinearGradient(0,730,0,1056);
    prg.addColorStop(0,"rgba(112,132,176,.30)"); prg.addColorStop(.55,"rgba(82,98,138,.06)"); prg.addColorStop(1,"rgba(60,75,110,0)");
    sx.fillStyle=prg; sx.fillRect(70,726,460,336); sx.restore();
    sx.save(); sx.globalCompositeOperation="multiply";
    for(var r3=11;r3<ROWS;r3++) for(var c3=0;c3<14;c3++){ if(!inPond(c3,r3)){
      var near=inPond(c3-1,r3)||inPond(c3+1,r3)||inPond(c3,r3-1)||inPond(c3,r3+1)||inPond(c3-1,r3-1)||inPond(c3+1,r3+1)||inPond(c3-1,r3+1)||inPond(c3+1,r3-1);
      if(near){ sx.fillStyle="rgba(38,58,70,.5)"; sx.fillRect(c3*TS,r3*TS,TS,TS); } } }
    sx.restore();
    // feather the pond's blocky rim so the water meets the grass softly
    sx.save(); sx.filter="blur(7px)"; sx.globalCompositeOperation="multiply";
    sx.strokeStyle="rgba(22,36,32,.5)"; sx.lineWidth=18;
    sx.beginPath(); sx.ellipse(297,893,212,154,0,0,6.28); sx.stroke(); sx.restore();
    // 3) worn earth path to the door
    for(var p=0;p<PATH.length;p++){ var pf=Rf()<0.5?-1:1;
      sx.save(); sx.translate(PATH[p][0]*TS+(pf<0?TS:0), PATH[p][1]*TS); sx.scale(pf,1);
      sx.drawImage(IMG.earth_1,0,0); sx.restore(); }
    // 4) y-sorted objects
    var obj=[];
    // scattered meadow detail — true-random flowers/clover/sprigs across the open field
    var Rs=rnd(127), DEC=['flowers_a','flowers_b','flowers_c','clover_a','clover_b','sprout','flowers_b','clover_a'];
    for(var pl=0,tr=0; pl<26 && tr<260; tr++){
      var cc=Math.floor(Rs()*COLS), rr=Math.floor(Rs()*ROWS);
      if(!openCell(cc,rr)) continue;
      place(obj, IMG[DEC[Math.floor(Rs()*DEC.length)]], cc, rr, Math.floor((Rs()-0.5)*30), Math.floor((Rs()-0.5)*18));
      pl++;
    }
    // reeds & clover at the water's edge — soften the pond's line
    [[8,12],[10,13],[11,15],[6,12],[11,18],[3,21],[2,20]].forEach(function(pc){
      place(obj, IMG[Rs()<0.5?"sprout":"clover_a"], pc[0],pc[1], Math.floor((Rs()-0.5)*14), 0); });
    var house={img:IMG.house, x:672, y:48, by:17*TS};   // upper-centre-right, base row 17
    place(obj, IMG.tree, 3, 5); place(obj, IMG.tree, 10, 8); place(obj, IMG.tree, 33, 4);
    place(obj, IMG.tree_gold, 12, 16);
    place(obj, IMG.bush_3, 7, 13); place(obj, IMG.bush_7, 15, 20); place(obj, IMG.bush_3, 29, 18);
    place(obj, IMG.sprout, 17, 18); place(obj, IMG.sprout, 26, 22);
    place(obj, IMG.rock_2, 11, 16); place(obj, IMG.rock_2, 3, 21); place(obj, IMG.rock_5, 18, 22);
    // (the resident stands alone at the door — flowers are scattered across the meadow)
    place(obj, IMG.bench, 28, 20);
    place(obj, IMG.campfire, 26, 20);
    place(obj, IMG.lantern, 21, 17); place(obj, IMG.lantern, 20, 21);
    placeChar(obj, 23, 18);
    obj.push(house);
    obj.sort(function(a,b){ return a.by-b.by; });
    obj.forEach(function(o){ if(o.char){
        sx.save(); sx.globalAlpha=.30; sx.fillStyle="#0a1510"; sx.beginPath(); sx.ellipse(o.x+24,o.by-2,15,6,0,0,6.28); sx.fill(); sx.restore();
        sx.drawImage(IMG.char, 48,0,48,48, o.x,o.y,48,48); }
      else sx.drawImage(o.img, Math.round(o.x), Math.round(o.y)); });
    LIGHTS=[
      {x:1082,y:520,r:215,c:[236,150,186],i:1.0,win:true},   // left main window — rose heartbeat
      {x:1184,y:386,r:120,c:[236,162,190],i:.5,win:true},    // gable window — softer
      {x:1100,y:856,r:140,c:[246,182,150],i:.95},            // porch lantern by the door
      {x:986,y:1004,r:120,c:[246,182,150],i:.8},             // path lantern
      {x:1268,y:980,r:170,c:[255,150,70],i:1.0,fire:true},   // campfire amber
      {x:1128,y:884,r:90,c:[218,150,172],i:.72,soul:true},   // the resident — a breathing rose presence
    ];
    var gg=gray.getContext("2d"); gg.filter="grayscale(1)"; gg.drawImage(scene,0,0); gg.filter="none";
  }
  var LIGHTS=[];

  // ---- particles ----
  var motes=[];
  function seedMotes(){ motes=[]; for(var i=0;i<80;i++){ var warm=rnd(11+i)()<.45;
    motes.push({ x: warm?(1185+rnd(99+i)()*130):(rnd(99+i)()*SW),
                 y: warm?(930+rnd(7+i)()*90):(520+rnd(7+i)()*560),
                 a:rnd(3+i)()*6.28, s:.1+rnd(5+i)()*.25, warm:warm, ph:rnd(13+i)()*6.28}); } }

  // ---- the dusk lighting + grade pass (per frame) ----
  var W=0,H=0,scale=1,ox=0,oy=0;
  function fit(){ W=innerWidth; H=innerHeight; view.width=W; view.height=H;
    scale=Math.max(W/SW, H/SH);            // cover — fill the frame, vignette frames it
    ox=(W-SW*scale)/2; oy=(H-SH*scale)/2; }

  function s2v(x,y){ return [ox+x*scale, oy+y*scale]; }

  function draw(t){
    var tt=REDUCED?6:t*0.001;
    vx.clearRect(0,0,W,H); vx.fillStyle="#05050b"; vx.fillRect(0,0,W,H);
    vx.imageSmoothingEnabled=false;
    vx.drawImage(scene, ox,oy, SW*scale, SH*scale);                 // crisp pixel scene
    vx.imageSmoothingEnabled=true;
    // --- desaturate (monochrome-lean) ---
    vx.globalAlpha=0.14; vx.drawImage(gray, ox,oy, SW*scale, SH*scale); vx.globalAlpha=1;
    // --- ambient dusk: a lighter cool multiply (moonlit, not murky) ---
    vx.globalCompositeOperation="multiply";
    var amb=vx.createLinearGradient(0,oy,0,oy+SH*scale);
    amb.addColorStop(0,"#8a91b8"); amb.addColorStop(0.55,"#777fa7"); amb.addColorStop(1,"#656b93");
    vx.fillStyle=amb; vx.fillRect(0,0,W,H);
    // cool moonlight lift in the shadows
    vx.globalCompositeOperation="lighter";
    vx.fillStyle="rgba(44,58,96,.13)"; vx.fillRect(0,0,W,H);
    vx.globalCompositeOperation="source-over";
    // --- warm light pools (additive) + bloom ---
    vx.globalCompositeOperation="lighter";
    // a soft warm hearth-glow anchoring the home in the cool dusk
    var hp=s2v(1150,560), hr=560*scale;
    var hg=vx.createRadialGradient(hp[0],hp[1],0,hp[0],hp[1],hr);
    hg.addColorStop(0,"rgba(246,198,152,.09)"); hg.addColorStop(0.5,"rgba(238,176,150,.035)"); hg.addColorStop(1,"rgba(238,176,150,0)");
    vx.fillStyle=hg; vx.beginPath(); vx.arc(hp[0],hp[1],hr,0,6.28); vx.fill();
    for(var i=0;i<LIGHTS.length;i++){ var L=LIGHTS[i];
      var fl = REDUCED?1:(L.fire?(0.75+0.25*(Math.sin(tt*9)+0.4*Math.sin(tt*23))):
                          L.soul?(0.78+0.22*Math.sin(tt*1.2)):
                          L.win?(0.9+0.1*Math.sin(tt*0.7)):(0.85+0.15*Math.sin(tt*2.1+i)));
      var p=s2v(L.x,L.y), rr=L.r*scale*(L.fire?(0.92+0.12*Math.sin(tt*11)):1);
      var g=vx.createRadialGradient(p[0],p[1],0,p[0],p[1],rr);
      var c=L.c, a=L.i*fl;
      g.addColorStop(0,"rgba("+c[0]+","+c[1]+","+c[2]+","+(0.66*a)+")");
      g.addColorStop(0.32,"rgba("+c[0]+","+c[1]+","+c[2]+","+(0.28*a)+")");
      g.addColorStop(1,"rgba("+c[0]+","+c[1]+","+c[2]+",0)");
      vx.fillStyle=g; vx.beginPath(); vx.arc(p[0],p[1],rr,0,6.28); vx.fill();
      // bright core (bloom)
      var cr=(L.win?22:L.fire?13:L.soul?10:8)*scale;
      var g2=vx.createRadialGradient(p[0],p[1],0,p[0],p[1],cr);
      g2.addColorStop(0,"rgba("+Math.min(255,c[0]+48)+","+Math.min(255,c[1]+48)+","+Math.min(255,c[2]+36)+","+(0.96*fl)+")");
      g2.addColorStop(1,"rgba("+c[0]+","+c[1]+","+c[2]+",0)");
      vx.fillStyle=g2; vx.beginPath(); vx.arc(p[0],p[1],cr,0,6.28); vx.fill();
    }
    // pond shimmer — drifting dusk light on the water
    for(var sP=0;sP<6;sP++){
      var syp=792+sP*36, drift=Math.sin(tt*0.55+sP*1.7);
      var sxp=210+drift*70+sP*14, sw=64+34*Math.sin(tt*0.9+sP*1.3);
      var pp=s2v(sxp,syp);
      var gp=vx.createLinearGradient(pp[0],pp[1],pp[0]+sw*scale,pp[1]);
      var sa=(0.05+0.06*(0.5+0.5*Math.sin(tt*1.25+sP*2))).toFixed(3);
      gp.addColorStop(0,"rgba(150,178,222,0)"); gp.addColorStop(0.5,"rgba(176,202,238,"+sa+")"); gp.addColorStop(1,"rgba(150,178,222,0)");
      vx.fillStyle=gp; vx.fillRect(pp[0],pp[1],sw*scale,2.2*scale+1);
    }
    // embers from the fire + fireflies
    for(var m=0;m<motes.length;m++){ var o=motes[m];
      if(!REDUCED){ o.x+=Math.cos(o.a)*o.s; o.y-=o.s*(o.warm?1.1:0.5)+Math.sin(o.ph)*0.1; o.ph+=0.02; o.a+=0.01;
        if(o.warm){ if(o.y<770){ o.y=995; o.x=1185+Math.abs(Math.sin(o.ph*7))*130; } }
        else if(o.y<430){ o.y=SH-30; o.x=rnd(o.x|0)()*SW; } }
      var p2=s2v(o.x,o.y); var al=(0.3+0.4*Math.sin(tt*2+m))*(o.warm?1:0.6);
      vx.fillStyle=o.warm?"rgba(255,194,120,"+al.toFixed(2)+")":"rgba(160,205,180,"+(al*0.7).toFixed(2)+")";
      var sz=(o.warm?2.2:1.8)*scale*0.5+1; vx.fillRect(p2[0]|0,p2[1]|0,sz,sz); }
    vx.globalCompositeOperation="source-over";
    // --- split-tone grade ---
    vx.globalCompositeOperation="overlay"; vx.fillStyle="rgba(58,72,124,.17)"; vx.fillRect(0,0,W,H); // cool shadows
    vx.globalCompositeOperation="soft-light"; vx.fillStyle="rgba(244,198,158,.10)"; vx.fillRect(0,0,W,H); // warm highs
    vx.globalCompositeOperation="source-over";
    // --- vignette (frame the world) ---
    var vg=vx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.28, W/2,H*0.5,Math.max(W,H)*0.74);
    vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(0.62,"rgba(5,5,12,.30)"); vg.addColorStop(0.85,"rgba(4,4,10,.58)"); vg.addColorStop(1,"rgba(2,2,7,.90)");
    vx.fillStyle=vg; vx.fillRect(0,0,W,H);
    // foreground frame — darken top & bottom edges for diorama depth
    var fgr=vx.createLinearGradient(0,0,0,H);
    fgr.addColorStop(0,"rgba(4,5,12,.36)"); fgr.addColorStop(0.12,"rgba(4,5,12,0)");
    fgr.addColorStop(0.86,"rgba(3,4,10,0)"); fgr.addColorStop(1,"rgba(2,3,8,.44)");
    vx.fillStyle=fgr; vx.fillRect(0,0,W,H);
    // --- grain ---
    if(grain){ vx.globalAlpha=0.05; vx.globalCompositeOperation="overlay";
      vx.drawImage(grain, (tt*40%64)|0,(tt*30%64)|0, W,H); vx.globalAlpha=1; vx.globalCompositeOperation="source-over"; }
  }

  // grain texture
  var grain=document.createElement("canvas"); grain.width=grain.height=128;
  (function(){ var g=grain.getContext("2d"), id=g.createImageData(128,128), d=id.data;
    for(var i=0;i<d.length;i+=4){ var v=Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; } g.putImageData(id,0,0); })();

  function loop(t){ draw(t); requestAnimationFrame(loop); }
  window.addEventListener("resize", fit, {passive:true});

  load().then(function(){
    document.getElementById("loading").style.display="none";
    compose(); seedMotes(); fit();
    if(REDUCED){ draw(0); } else requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>
